name: Rust CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      EADKP_PRIMARY_BUILD: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ARM Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi libnewlib-arm-none-eabi

      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: thumbv7em-none-eabihf

      - name: Build external app (device)
        run: cargo +nightly build --release --example device --target thumbv7em-none-eabihf

      - name: Prepare NWA Output
        run: |
          mkdir -p build
          # Copy the generated elf to the specific name nwa file
          cp target/thumbv7em-none-eabihf/release/examples/device build/minesweeper_nw.nwa
          ls -lah build/
          file build/minesweeper_nw.nwa
          sha256sum build/minesweeper_nw.nwa

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: minesweeper_nw.nwa
          path: build/minesweeper_nw.nwa

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: minesweeper_nw.nwa
          path: build/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/minesweeper_nw.nwa
          generate_release_notes: true
          draft: false
          prerelease: false
