services:
  eadkp-dev:
    extends:
      file: .eadkp/docker-compose.base.yml
      service: eadkp-dev
    container_name: ${PROJECT_NAME}
    working_dir: /workspace/${PROJECT_NAME}
    volumes:
      - ./:/workspace/${PROJECT_NAME}
      # Cargo registry and git cache
      - cargo-registry:/home/dev/.cargo/registry
      - cargo-git:/home/dev/.cargo/git

volumes:
  cargo-registry:
  cargo-git:

# X11 and Wayland support (on Linux hosts).
# For Windows/WSL2, WSL2 integrate a X server
# For macOS, you likely need an external X11 server and manual socket setup. (untested)